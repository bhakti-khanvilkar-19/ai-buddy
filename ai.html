<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Engineering & Agentic AI Complete Handbook</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #7c3aed;
            --accent-color: #06b6d4;
            --bg-light: #ffffff;
            --bg-dark: #0f172a;
            --text-light: #1e293b;
            --text-dark: #e2e8f0;
            --sidebar-light: #f8fafc;
            --sidebar-dark: #1e293b;
            --card-light: #f1f5f9;
            --card-dark: #334155;
            --border-light: #e2e8f0;
            --border-dark: #475569;
            --code-bg-light: #f8fafc;
            --code-bg-dark: #1e293b;
            --success-color: #22c55e;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            background-color: var(--bg-light);
            transition: all 0.3s ease;
        }

        body.dark-mode {
            color: var(--text-dark);
            background-color: var(--bg-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-light);
            border-right: 1px solid var(--border-light);
            overflow-y: auto;
            position: fixed;
            height: 100vh;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        body.dark-mode .sidebar {
            background-color: var(--sidebar-dark);
            border-right-color: var(--border-dark);
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-light);
        }

        body.dark-mode .sidebar-header {
            border-bottom-color: var(--border-dark);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .search-container {
            padding: 1rem;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-light);
            border-radius: 0.5rem;
            background-color: var(--bg-light);
            color: var(--text-light);
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        body.dark-mode .search-input {
            background-color: var(--bg-dark);
            color: var(--text-dark);
            border-color: var(--border-dark);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .nav-sections {
            padding: 1rem 0;
        }

        .nav-section {
            margin-bottom: 0.5rem;
        }

        .nav-section-header {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--text-light);
        }

        body.dark-mode .nav-section-header {
            color: var(--text-dark);
        }

        .nav-section-header:hover {
            background-color: rgba(37, 99, 235, 0.1);
        }

        .nav-section-header .chevron {
            transition: transform 0.3s ease;
        }

        .nav-section.expanded .chevron {
            transform: rotate(90deg);
        }

        .nav-items {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .nav-section.expanded .nav-items {
            max-height: 1000px;
        }

        .nav-item {
            padding: 0.5rem 1.5rem 0.5rem 3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
            color: var(--text-light);
        }

        body.dark-mode .nav-item {
            color: var(--text-dark);
        }

        .nav-item:hover {
            background-color: rgba(37, 99, 235, 0.05);
            color: var(--primary-color);
        }

        .nav-item.active {
            background-color: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 300px;
            padding: 2rem;
            max-width: 1200px;
            margin-right: auto;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
        }

        body.dark-mode .content-header {
            border-bottom-color: var(--border-dark);
        }

        .theme-toggle {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-light);
            border-radius: 0.5rem;
            background-color: transparent;
            color: var(--text-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        body.dark-mode .theme-toggle {
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        .theme-toggle:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Sections */
        .section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-light);
        }

        body.dark-mode h1 {
            color: var(--text-dark);
        }

        h2 {
            font-size: 2rem;
            margin: 2rem 0 1rem;
            color: var(--text-light);
        }

        body.dark-mode h2 {
            color: var(--text-dark);
        }

        h3 {
            font-size: 1.5rem;
            margin: 1.5rem 0 0.75rem;
            color: var(--text-light);
        }

        body.dark-mode h3 {
            color: var(--text-dark);
        }

        p {
            margin-bottom: 1rem;
        }

        /* Cards */
        .concept-card {
            background-color: var(--card-light);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        body.dark-mode .concept-card {
            background-color: var(--card-dark);
            border-color: var(--border-dark);
        }

        .concept-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .concept-icon {
            width: 48px;
            height: 48px;
            background-color: var(--primary-color);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .definition-box {
            background-color: var(--bg-light);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            border-left: 4px solid var(--primary-color);
        }

        body.dark-mode .definition-box {
            background-color: var(--bg-dark);
        }

        .why-matters-box {
            background-color: rgba(34, 197, 94, 0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            border-left: 4px solid var(--success-color);
        }

        .analogy-box {
            background-color: rgba(6, 182, 212, 0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            border-left: 4px solid var(--accent-color);
        }

        .mistake-box {
            background-color: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            border-left: 4px solid var(--error-color);
        }

        .example-box {
            background-color: rgba(124, 58, 237, 0.1);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            border-left: 4px solid var(--secondary-color);
        }

        /* Code blocks */
        .code-block {
            background-color: var(--code-bg-light);
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 1rem 0;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
            position: relative;
        }

        body.dark-mode .code-block {
            background-color: var(--code-bg-dark);
        }

        .code-lang {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.75rem;
            color: var(--secondary-color);
            background-color: rgba(124, 58, 237, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }

        /* Tables */
        .table-container {
            overflow-x: auto;
            margin: 1rem 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--bg-light);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        body.dark-mode table {
            background-color: var(--card-dark);
        }

        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border-light);
        }

        body.dark-mode th,
        body.dark-mode td {
            border-bottom-color: var(--border-dark);
        }

        th {
            background-color: var(--card-light);
            font-weight: 600;
        }

        body.dark-mode th {
            background-color: var(--bg-dark);
        }

        /* Diagrams */
        .diagram-container {
            background-color: var(--bg-light);
            padding: 2rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            border: 1px solid var(--border-light);
            display: flex;
            justify-content: center;
            overflow-x: auto;
        }

        body.dark-mode .diagram-container {
            background-color: var(--card-dark);
            border-color: var(--border-dark);
        }

        /* Roadmap */
        .roadmap {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem 0;
        }

        .roadmap-level {
            background-color: var(--card-light);
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 2px solid var(--border-light);
            position: relative;
            transition: all 0.3s ease;
        }

        body.dark-mode .roadmap-level {
            background-color: var(--card-dark);
            border-color: var(--border-dark);
        }

        .roadmap-level:hover {
            transform: translateX(10px);
            border-color: var(--primary-color);
        }

        .roadmap-level::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background-color: var(--primary-color);
            border-radius: 50%;
        }

        /* Responsive */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1100;
            padding: 0.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }

            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                padding: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            h2 {
                font-size: 1.5rem;
            }

            h3 {
                font-size: 1.25rem;
            }
        }

        /* Collapsible sections */
        .collapsible {
            background-color: var(--card-light);
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: 0.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        body.dark-mode .collapsible {
            background-color: var(--card-dark);
        }

        .collapsible:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            padding: 0 1rem;
        }

        .collapsible-content.expanded {
            max-height: 2000px;
            padding: 1rem;
        }

        /* Progress indicator */
        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: var(--border-light);
            border-radius: 2px;
            overflow: hidden;
            margin: 1rem 0;
        }

        body.dark-mode .progress-bar {
            background-color: var(--border-dark);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Interactive elements */
        .interactive-demo {
            background-color: var(--card-light);
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin: 1rem 0;
            border: 1px solid var(--border-light);
        }

        body.dark-mode .interactive-demo {
            background-color: var(--card-dark);
            border-color: var(--border-dark);
        }

        .button {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .button-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .button-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .button-secondary {
            background-color: var(--secondary-color);
            color: white;
        }

        .button-secondary:hover {
            background-color: #6d28d9;
            transform: translateY(-2px);
        }

        /* Tooltips */
        .tooltip {
            position: relative;
            display: inline-block;
            border-bottom: 1px dashed var(--primary-color);
            cursor: help;
        }

        .tooltip-text {
            visibility: hidden;
            background-color: var(--bg-dark);
            color: var(--text-dark);
            text-align: center;
            padding: 0.5rem;
            border-radius: 0.25rem;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.875rem;
            white-space: nowrap;
        }

        .tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 0.25rem;
        }

        .badge-primary {
            background-color: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
        }

        .badge-success {
            background-color: rgba(34, 197, 94, 0.1);
            color: var(--success-color);
        }

        .badge-warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--warning-color);
        }

        .badge-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
        }

        /* Mermaid diagram styles */
        .mermaid {
            text-align: center;
        }

        /* Learning path cards */
        .learning-path {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .path-card {
            background-color: var(--card-light);
            padding: 1.5rem;
            border-radius: 0.75rem;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        body.dark-mode .path-card {
            background-color: var(--card-dark);
            border-color: var(--border-dark);
        }

        .path-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 2rem;
            margin: 2rem 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: var(--border-light);
        }

        body.dark-mode .timeline::before {
            background-color: var(--border-dark);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 2rem;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2.5rem;
            top: 0.5rem;
            width: 12px;
            height: 12px;
            background-color: var(--primary-color);
            border-radius: 50%;
            border: 2px solid var(--bg-light);
        }

        body.dark-mode .timeline-item::before {
            border-color: var(--bg-dark);
        }

        /* Tabs */
        .tabs {
            margin: 2rem 0;
        }

        .tab-headers {
            display: flex;
            border-bottom: 2px solid var(--border-light);
            gap: 1rem;
            overflow-x: auto;
        }

        body.dark-mode .tab-headers {
            border-bottom-color: var(--border-dark);
        }

        .tab-header {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .tab-header:hover {
            color: var(--primary-color);
        }

        .tab-header.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .tab-content {
            display: none;
            padding: 1.5rem 0;
        }

        .tab-content.active {
            display: block;
        }

        /* Architecture cards */
        .architecture-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .arch-component {
            background-color: var(--card-light);
            padding: 1.5rem;
            border-radius: 0.75rem;
            text-align: center;
            border: 2px solid var(--border-light);
            transition: all 0.3s ease;
        }

        body.dark-mode .arch-component {
            background-color: var(--card-dark);
            border-color: var(--border-dark);
        }

        .arch-component:hover {
            transform: scale(1.05);
            border-color: var(--primary-color);
        }

        /* Feature comparison */
        .feature-comparison {
            overflow-x: auto;
            margin: 2rem 0;
        }

        .comparison-table {
            width: 100%;
            min-width: 600px;
        }

        .comparison-table th {
            background-color: var(--primary-color);
            color: white;
            position: sticky;
            top: 0;
        }

        .check-icon {
            color: var(--success-color);
        }

        .x-icon {
            color: var(--error-color);
        }

        /* Skill levels */
        .skill-meter {
            display: flex;
            gap: 0.25rem;
            margin: 0.5rem 0;
        }

        .skill-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--border-light);
        }

        body.dark-mode .skill-dot {
            background-color: var(--border-dark);
        }

        .skill-dot.filled {
            background-color: var(--primary-color);
        }

        /* Interactive Quiz */
        .quiz-container {
            background-color: var(--card-light);
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin: 2rem 0;
            border: 1px solid var(--border-light);
        }

        body.dark-mode .quiz-container {
            background-color: var(--card-dark);
            border-color: var(--border-dark);
        }

        .quiz-option {
            padding: 1rem;
            margin: 0.5rem 0;
            border: 1px solid var(--border-light);
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.dark-mode .quiz-option {
            border-color: var(--border-dark);
        }

        .quiz-option:hover {
            background-color: rgba(37, 99, 235, 0.1);
            border-color: var(--primary-color);
        }

        .quiz-option.correct {
            background-color: rgba(34, 197, 94, 0.1);
            border-color: var(--success-color);
        }

        .quiz-option.incorrect {
            background-color: rgba(239, 68, 68, 0.1);
            border-color: var(--error-color);
        }

        /* Glossary */
        .glossary-grid {
            display: grid;
            gap: 1rem;
            margin: 2rem 0;
        }

        .glossary-item {
            background-color: var(--card-light);
            padding: 1.5rem;
            border-radius: 0.75rem;
            border-left: 4px solid var(--primary-color);
        }

        body.dark-mode .glossary-item {
            background-color: var(--card-dark);
        }

        .glossary-term {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        /* Copy button */
        .copy-button {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.25rem 0.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .code-block:hover .copy-button {
            opacity: 1;
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border-light);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
        ☰
    </button>

    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">

import numpy as np

def self_attention(query, key, value, d_k):
    """
    query, key, value: Matrices of shape (seq_len, d_k)
    d_k: Dimension of key vectors
    """
    # Calculate attention scores
    scores = np.matmul(query, key.T) / np.sqrt(d_k)
    
    # Apply softmax to get attention weights
    attention_weights = np.exp(scores) / np.sum(np.exp(scores), axis=1, keepdims=True)
    
    # Apply attention to values
    output = np.matmul(attention_weights, value)
    
    return output, attention_weights

# Example with 3 tokens, 4 dimensions
seq_len, d_k = 3, 4
query = np.random.randn(seq_len, d_k)
key = np.random.randn(seq_len, d_k)
value = np.random.randn(seq_len, d_k)

output, weights = self_attention(query, key, value, d_k)
print("Attention weights:")
print(weights)

                    <h2>1. Tokenization</h2>

                            <tr><td>mxbai-embed-large</td><td>1 024</td><td>MTEB top performer</td><td>MixedBread AI</td></tr>
                        </tbody>
                    </table>

                    <hr>
                    <h2>3. Self-Attention</h2>
                    <p>The core innovation of the Transformer. Self-attention lets every token in the input look at every other token and decide how much to weight it when forming its own representation.</p>

                    <div class="mermaid">
flowchart LR
    subgraph Input
        T["Token Embeddings\n[x₁, x₂, ..., xₙ]"]
    end
    subgraph Projections
        T --> Q["Q = x·Wq\nQuery Matrix"]
        T --> K["K = x·Wk\nKey Matrix"]
        T --> V["V = x·Wv\nValue Matrix"]
    end
    subgraph Attention
        Q --> S["Scores = Q·Kᵀ / √dₖ"]
        K --> S
        S --> SF["Softmax → Weights"]
        SF --> O["Output = Weights · V"]
        V --> O
    end
                    </div>

                    <div class="example-box">
                        <strong>Numerical Intuition:</strong><br>
                        "The cat sat on the mat because <strong>it</strong> was tired."<br><br>
                        When processing "it", the attention scores will be:<br>
                        cat → 0.72 &nbsp;|&nbsp; mat → 0.08 &nbsp;|&nbsp; sat → 0.11 &nbsp;|&nbsp; tired → 0.09<br><br>
                        The model learns "it" refers to "cat" — not "mat".
                    </div>

                    <h3>Multi-Head Attention</h3>
                    <p>Instead of one set of Q/K/V projections, use <strong>H parallel heads</strong>, each learning a different relationship pattern. All heads' outputs are concatenated and projected.</p>

                    <div class="mermaid">
flowchart TD
    I[Input Embeddings] --> H1[Head 1\nSyntactic roles]
    I --> H2[Head 2\nCoreference]
    I --> H3[Head 3\nSemantic similarity]
    I --> H4[Head 4..H\nOther patterns]
    H1 --> C[Concatenate]
    H2 --> C
    H3 --> C
    H4 --> C
    C --> P[Linear Projection]
    P --> O[Rich Contextual Representation]
                    </div>

                    <hr>
                    <h2>4. Full Transformer Architecture</h2>
                    <div class="mermaid">
flowchart TD
    subgraph Encoder
        PE[Input + Positional Encoding] --> MHA[Multi-Head Attention]
        MHA --> AN1[Add & Norm]
        AN1 --> FFN[Feed-Forward Network\nReLU / GELU]
        FFN --> AN2[Add & Norm]
    end
    subgraph Decoder
        TE[Target + Positional Encoding] --> MMHA[Masked Multi-Head Attn]
        MMHA --> AN3[Add & Norm]
        AN3 --> CMHA[Cross-Attention\nEncoder Output]
        AN2 --> CMHA
        CMHA --> AN4[Add & Norm]
        AN4 --> FFN2[Feed-Forward Network]
        FFN2 --> AN5[Add & Norm]
        AN5 --> LIN[Linear + Softmax]
        LIN --> OUT[Output Probabilities]
    end
                    </div>

                    <div class="grid-container">
                        <div class="card">
                            <h3>Residual Connections</h3>
                            <p>Each sub-layer output is added to its input: <code>output = LayerNorm(x + SubLayer(x))</code>. Prevents vanishing gradients in deep networks.</p>
                        </div>
                        <div class="card">
                            <h3>Layer Normalisation</h3>
                            <p>Normalises activations across the feature dimension (not batch). Stabilises training and speeds convergence.</p>
                        </div>
                        <div class="card">
                            <h3>Positional Encoding</h3>
                            <p>Transformers have no built-in order sense. Sinusoidal or learned position embeddings are added to token embeddings to inject sequence position.</p>
                        </div>
                        <div class="card">
                            <h3>Feed-Forward Networks</h3>
                            <p>Two linear layers with a non-linearity (GELU/ReLU). Dimension typically 4× the model width. Adds per-token capacity.</p>
                        </div>
                    </div>

                    <div class="progress-bar"><div class="progress-fill" style="width:78%"></div></div>
                </section>
            `,

            'llm-inference': `
                <section class="section active" id="llm-inference">
                    <h1>⚙️ LLM Inference Engine</h1>
                    <p class="lead">From the moment you hit "send" to the first token streaming back — every step of how a language model generates text.</p>

                    <h2>Complete Request Lifecycle</h2>
                    <div class="mermaid">
flowchart TD
    A["User Prompt"] --> B[Tokenizer]
    B --> C[Embedding Layer]
    C --> D[Transformer Layers × N]
    D --> E[Logits\nvocab_size float32 vector]
    E --> F[Softmax → Probabilities]
    F --> G{Sampling Strategy}
    G --> H[Temperature Scaling]
    H --> I[Top-K Filter]
    I --> J[Top-P / Nucleus Filter]
    J --> K[Sample Token ID]
    K --> L[Detokenize]
    L --> M[Append to Context]
    M --> N{Stop Sequence?}
    N -->|No| D
    N -->|Yes| O[Return Response]
                    </div>

                    <hr>
                    <h2>Temperature</h2>
                    <p>Temperature controls <strong>randomness</strong>. It divides the logits before the softmax, sharpening or flattening the probability distribution.</p>

                    <div class="grid-container">
                        <div class="card">
                            <h3>🧊 Temperature = 0</h3>
                            <p>Always picks the highest-probability token. Deterministic and repetitive. Use for: <strong>structured data extraction, code generation, classification</strong>.</p>
                        </div>
                        <div class="card">
                            <h3>Temperature = 0.2–0.5</h3>
                            <p>Mostly deterministic with slight variation. Good for: <strong>factual Q&amp;A, analysis, debugging, documentation</strong>.</p>
                        </div>
                        <div class="card">
                            <h3>Temperature = 0.7–0.9</h3>
                            <p>Balanced creativity and coherence. Ideal for: <strong>chatbots, content writing, brainstorming, research summaries</strong>.</p>
                        </div>
                        <div class="card">
                            <h3>🔥 Temperature ≥ 1.0</h3>
                            <p>High randomness, unexpected outputs. Use for: <strong>creative writing, poetry, ideation sessions, fiction</strong>. Risk of hallucination increases.</p>
                        </div>
                    </div>

                    <h3>Interactive Temperature Demo</h3>
                    <div class="card">
                        <label><strong>Temperature: <span id="tempVal">0.7</span></strong></label><br>
                        <input type="range" min="0" max="2" step="0.1" value="0.7" id="tempSlider" oninput="updateTempDemo()" style="width:100%;margin:.5rem 0;"><br>
                        <div id="tempOutput" style="margin-top:.5rem;font-size:.9rem;"></div>
                    </div>

                    <hr>
                    <h2>Top-K Sampling</h2>
                    <p>Restricts sampling to the <strong>K highest-probability tokens</strong>. All other tokens have their probability set to 0.</p>
                    <div class="example-box">
                        <strong>Example with Top-K = 3:</strong><br>
                        Full vocab probs: cat=30%, dog=25%, bird=20%, fish=10%, car=5%, ...<br>
                        After Top-3 filter: cat=40%, dog=33%, bird=27% (renormalised)<br>
                        "car" and "fish" can never be picked.
                    </div>

                    <h2>Top-P (Nucleus) Sampling</h2>
                    <p>Selects tokens whose cumulative probability exceeds the threshold <strong>P</strong>. More adaptive than Top-K — the "nucleus" size varies with distribution shape.</p>
                    <div class="example-box">
                        <strong>Example with Top-P = 0.9:</strong><br>
                        Sorted: cat=30%, dog=25%, bird=20%, fish=15% → cumulative 90% reached<br>
                        Only these 4 tokens are in the nucleus. "car" (5%) is excluded.
                    </div>

                    <h2>Frequency &amp; Presence Penalties</h2>
                    <table>
                        <thead><tr><th>Parameter</th><th>What it does</th><th>Range</th><th>Use case</th></tr></thead>
                        <tbody>
                            <tr><td><strong>Frequency Penalty</strong></td><td>Reduces probability of tokens proportional to how many times they've appeared</td><td>0–2</td><td>Reduce repetition in long outputs</td></tr>
                            <tr><td><strong>Presence Penalty</strong></td><td>Applies a flat reduction to any token that has appeared at least once</td><td>0–2</td><td>Encourage topic diversity</td></tr>
                        </tbody>
                    </table>

                    <h2>Stop Sequences</h2>
                    <p>Strings that, when generated, cause the model to immediately stop. Useful for structured output and JSON parsing.</p>
                    <div class="code-block">
                        <pre><code class="language-python">response = client.chat.completions.create(
    model="gpt-4o",
    messages=[{"role": "user", "content": "List 3 programming languages:"}],
    stop=["4.", "\n\n"],  # Stop at 4th item or double newline
    temperature=0.3
)</code></pre>
                    </div>

                    <h2>Streaming</h2>
                    <p>Tokens are sent back to the client as they are generated rather than waiting for the full response. Dramatically improves perceived latency.</p>
                    <div class="code-block">
                        <pre><code class="language-python">with client.messages.stream(
    model="claude-sonnet-4-6",
    max_tokens=1024,
    messages=[{"role": "user", "content": "Explain RAG"}]
) as stream:
    for text in stream.text_stream:
        print(text, end="", flush=True)</code></pre>
                    </div>

                    <h2>Parameter Quick Reference</h2>
                    <table>
                        <thead><tr><th>Parameter</th><th>Recommended for Coding</th><th>Analysis</th><th>Creative</th><th>Agents</th></tr></thead>
                        <tbody>
                            <tr><td>Temperature</td><td>0–0.2</td><td>0.3–0.5</td><td>0.8–1.2</td><td>0.2–0.5</td></tr>
                            <tr><td>Top-P</td><td>0.9</td><td>0.9</td><td>0.95</td><td>0.9</td></tr>
                            <tr><td>Top-K</td><td>10–20</td><td>20–40</td><td>50</td><td>20</td></tr>
                            <tr><td>Max Tokens</td><td>2 048</td><td>4 096</td><td>4 096</td><td>8 192</td></tr>
                        </tbody>
                    </table>

                    <div class="progress-bar"><div class="progress-fill" style="width:82%"></div></div>
                </section>
            `,

            'context-eng-deep': `
                <section class="section active" id="context-eng-deep">
                    <h1>🏗️ Context Engineering Deep Dive</h1>
                    <p class="lead">Context Engineering is the discipline of <em>what you put in the context window</em> — not just how you phrase the prompt. It is rapidly replacing "prompt engineering" as the core skill of AI engineers.</p>

                    <h2>The Context Engineering Formula</h2>
                    <div class="mermaid">
flowchart LR
    K["📚 Knowledge\nDocs, RAG, Facts"] --> CTX
    M["🧠 Memory\nConversation, User history"] --> CTX
    I["📋 Instructions\nSystem prompt, Rules"] --> CTX
    T["🔧 Tools\nAPI schemas, Functions"] --> CTX
    S["💾 State\nApp state, Current task"] --> CTX
    U["🎯 User Intent\nGoal, Constraints"] --> CTX
    CTX{"Context\nAssembly Engine"} --> W["Context Window\n(200K tokens)"]
    W --> LLM["LLM Response"]
                    </div>

                    <h2>Why Context Engineering &gt; Prompt Engineering</h2>
                    <div class="grid-container">
                        <div class="card">
                            <h3>Prompt Engineering (2022)</h3>
                            <p>Focus: <em>How to phrase the question</em><br>Scope: Single turn, static text<br>Limit: No memory, no retrieval</p>
                        </div>
                        <div class="card">
                            <h3>Context Engineering (2024+)</h3>
                            <p>Focus: <em>What information the model has access to</em><br>Scope: Multi-turn, dynamic, stateful<br>Power: Memory + RAG + Tools + State</p>
                        </div>
                    </div>

                    <h2>Context Assembly Strategies</h2>
                    <div class="code-block"><pre><code>def assemble_context(user_query: str, user_id: str) -> list[dict]:
    # 1. Retrieve semantic memory
    past_interactions = memory.search(user_query, user_id, top_k=3)

    # 2. Retrieve relevant knowledge
    docs = vector_db.search(user_query, top_k=5)

    # 3. Get current app state
    state = app_state.get(user_id)

    # 4. Build the context window
    messages = [
        {"role": "system", "content": SYSTEM_PROMPT},
        {"role": "system", "content": f"User context: {state}"},
        {"role": "system", "content": f"Relevant docs:\n{format_docs(docs)}"},
    ]

    # 5. Inject relevant history (not all history)
    for mem in past_interactions:
        messages.append({"role": "user",      "content": mem["user"]})
        messages.append({"role": "assistant", "content": mem["assistant"]})

    # 6. Current query
    messages.append({"role": "user", "content": user_query})
    return messages</code></pre></div>

                    <h2>Context Compression Techniques</h2>

flowchart TD

                    <h2>Formula 1 — COSTAR</h2>

def call_with_retry(client, **kwargs, max_retries=3):

                    <h2>Minimal Jarvis Implementation</h2>
                    <div class="code-block"><pre><code">import anthropic, json, subprocess
import speech_recognition as sr
from gtts import gTTS
import pygame

client = anthropic.Anthropic()
memory = []  # Simple in-memory history

TOOLS = [
    {
        "name": "execute_shell",
        "description": "Execute a shell command and return output",
        "input_schema": {
            "type": "object",
            "properties": {"command": {"type": "string"}},
            "required": ["command"]
        }
    },
    {
        "name": "web_search",
        "description": "Search the web for current information",
        "input_schema": {
            "type": "object",
            "properties": {"query": {"type": "string"}},
            "required": ["query"]
        }
    }
]

def listen():
    r = sr.Recognizer()
    with sr.Microphone() as source:
        print("Listening...")
        audio = r.listen(source, timeout=5)
    return r.recognize_whisper(audio)

def speak(text):
    tts = gTTS(text)
    tts.save("/tmp/response.mp3")
    pygame.mixer.init()
    pygame.mixer.music.load("/tmp/response.mp3")
    pygame.mixer.music.play()

def execute_tool(name, inputs):
    if name == "execute_shell":
        result = subprocess.run(inputs["command"], shell=True, capture_output=True, text=True)
        return result.stdout or result.stderr
    elif name == "web_search":
        return f"[Search results for: {inputs['query']}]"  # integrate real search API

def run_agent(user_input):
    memory.append({"role": "user", "content": user_input})
    while True:
        response = client.messages.create(
            model="claude-sonnet-4-6",
            max_tokens=2048,
            system="You are JARVIS, a helpful personal AI assistant. Be concise.",
            tools=TOOLS,
            messages=memory
        )
        if response.stop_reason == "tool_use":
            tool_block = next(b for b in response.content if b.type == "tool_use")
            result = execute_tool(tool_block.name, tool_block.input)
            memory.append({"role": "assistant", "content": response.content})
            memory.append({"role": "user", "content": [
                {"type": "tool_result", "tool_use_id": tool_block.id, "content": result}
            ]})
        else:
            reply = response.content[0].text
            memory.append({"role": "assistant", "content": reply})
            return reply

# Main loop
while True:
    user_input = listen()
    if "jarvis" in user_input.lower():
        response = run_agent(user_input)
        speak(response)</code></pre></div>

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            initializeNavigation();

            loadSection('ai-foundations');
            
            // Initialize theme

            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                updateThemeToggle();
            }
        });

        // Navigation functions
        function initializeNavigation() {
            const navSections = document.querySelector('.nav-sections');
            
            sections.forEach(section => {
                const navSection = document.createElement('div');
                navSection.className = 'nav-section';
                navSection.id = `nav-${section.id}`;
                
                const header = document.createElement('div');
                header.className = 'nav-section-header';
                header.innerHTML = `
                    <span>${section.title}</span>
                    <span class="chevron">▶</span>
                `;
                header.onclick = () => toggleNavSection(section.id);
                
                const items = document.createElement('div');
                items.className = 'nav-items';
                
                section.items.forEach(item => {
                    const navItem = document.createElement('div');
                    navItem.className = 'nav-item';
                    navItem.textContent = item;
                    navItem.onclick = () => loadSection(section.id, item);
                    items.appendChild(navItem);
                });
                
                navSection.appendChild(header);
                navSection.appendChild(items);
                navSections.appendChild(navSection);
            });
        }

        function toggleNavSection(sectionId) {
            const navSection = document.getElementById(`nav-${sectionId}`);
            navSection.classList.toggle('expanded');
        }

        function loadSection(sectionId, item) {
            // Hide all sections
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            // Update navigation
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Load content
            const container = document.getElementById('content-container');
            if (sectionContent[sectionId]) {
                container.innerHTML = sectionContent[sectionId];
                
                // Re-initialize Mermaid for new content
                mermaid.init();
            }
            
            // Update active nav
            const navSection = document.getElementById(`nav-${sectionId}`);
            if (navSection) {
                navSection.classList.add('expanded');
            }
        }

        // Search functionality
        function initializeSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                filterNavItems(query);
            });
        }

        function filterNavItems(query) {
            const navItems = document.querySelectorAll('.nav-item');
            const navSections = document.querySelectorAll('.nav-section');
            
            if (!query) {
                navItems.forEach(item => item.style.display = 'block');
                return;
            }
            
            navSections.forEach(section => {
                let hasVisibleItems = false;
                const items = section.querySelectorAll('.nav-item');
                
                items.forEach(item => {
                    if (item.textContent.toLowerCase().includes(query)) {
                        item.style.display = 'block';
                        hasVisibleItems = true;
                    } else {
                        item.style.display = 'none';
                    }
                });
                
                if (hasVisibleItems) {
                    section.classList.add('expanded');
                }
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            updateThemeToggle();
            
            // Save preference
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            
            // Update Mermaid theme
            mermaid.initialize({ 
                startOnLoad: true,

        function demoTokenize() {
            const text = document.getElementById('tok-input').value.trim();
            if (!text) return;
            // BPE-like simple split on word boundaries and punctuation
            const tokens = text.match(/\w+|[^\w\s]/g) || [];
            const ids = tokens.map((_, i) => 10000 + i * 17 + text.length);
            const total = tokens.length;
            const approxCost = ((total / 1000) * 0.003).toFixed(6);
            document.getElementById('tok-output').innerHTML = `
                <div class="example-box">
                    <p><strong>Tokens (${total}):</strong> ${tokens.map(t => '<code>' + t + '</code>').join(' ')}</p>

                    <p><strong>Estimated cost (Claude Sonnet input):</strong> ~$${approxCost}</p>
                    <p><strong>Tip:</strong> In real BPE, sub-word splits and spaces are part of the token.</p>
                </div>`;
        }
