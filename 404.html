<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — AI Engineering Academy</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/components.css" />
    <link rel="stylesheet" href="/styles/themes.css" />
    <style>
      .notfound-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .notfound-code {
        font-family: var(--font-heading);
        font-size: clamp(3.5rem, 12vw, 6rem);
        font-weight: 800;
        color: var(--primary);
        line-height: 1;
        margin-bottom: 0.5rem;
      }
      .notfound-title {
        font-family: var(--font-heading);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 0.75rem;
      }
      .notfound-sub {
        font-family: var(--font-body);
        color: var(--text-muted);
        max-width: 420px;
        margin: 0 auto 2rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body class="dark">
    <div class="notfound-wrap">
      <div class="notfound-code">404</div>
      <div class="notfound-title">This page wandered off the learning path.</div>
      <p class="notfound-sub">
        The page you're looking for doesn't exist — it may have moved, or the link might be off.
      </p>
      <a class="button button-primary" href="/">Back to AI Academy →</a>
    </div>
  </body>
</html>
